<!DOCTYPE html>
<html>

      padding: 30px;
      text-align: center;
    }

      background: #25D366;

      border: none;

      color: white;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
      margin-top: 10px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
      margin-top: 30px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    input, textarea {
      width: 100%;

      margin: 8px 0;

      border: none;
    }

      padding: 15px;
      border-radius: 10px;
      margin: 10px auto;

<body>

    <input id="hp" placeholder="Tipe HP">

    <div class="testi">"Langsung cair, recommended!"</div>
  </div>

</div>

<script>
function wa() {
  window.location.href = "https://wa.me/6283805811175";
}

function kirim() {
  var nama = document.getElementById("nama").value;
  var hp = document.getElementById("hp").value;
  var kondisi = document.getElementById("kondisi").value;
  var harga = document.getElementById("harga").value;
  var ket = document.getElementById("ket").value;

  var text = "Halo saya mau jual HP - " +
             nama + " | " +
             hp + " | " +
             kondisi + " | " +
             harga + " | " +
