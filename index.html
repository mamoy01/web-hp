<!DOCTYPE html>
<html>
<head>
  <title>HPDIA - Jual Beli HP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(180deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
    }

    .sub {
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    .btn {
      background: #22c55e;
      padding: 15px;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
      margin-top: 10px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-top: 25px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #334155;
      color: white;
    }

    .price-box {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin: 10px auto;
      max-width: 320px;
      text-align: left;
    }

    .section {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>HPDIA 🔥</h1>
  <p class="sub">Beli & Terima Jual HP Bekas</p>

  <button class="btn" onclick="wa()">💬 Chat WhatsApp</button>

  <!-- PRICE LIST -->
  <div class="section">
    <h3>💰 Estimasi Harga Beli</h3>

    <div class="price-box">iPhone 11 → 3jt - 5jt</div>
    <div class="price-box">iPhone 12 → 5jt - 7jt</div>
    <div class="price-box">Samsung S21 → 4jt - 6jt</div>
    <div class="price-box">Xiaomi → 1jt - 3jt</div>

  </div>

  <!-- FORM -->
  <div class="card">
    <h3>Jual HP ke Gua</h3>
    <input id="nama" placeholder="Nama">
    <input id="hp" placeholder="Tipe HP">
    <input id="kondisi" placeholder="Kondisi">
    <input id="harga" placeholder="Harga diinginkan">
    <textarea id="ket" placeholder="Keterangan"></textarea>
    <button class="btn" onclick="kirim()">🚀 Kirim ke WhatsApp</button>
  </div>

  <!-- KELEBIHAN -->
  <div class="section">
    <h3>Kenapa pilih HPDIA?</h3>
    <p>⚡ Proses cepat</p>
    <p>💰 Harga nego santai</p>
    <p>🔒 Aman & terpercaya</p>
  </div>

</div>

<script>
function wa() {
  window.location.href = "https://api.whatsapp.com/send?phone=6283805811175";
}

function kirim() {
  var nama = document.getElementById("nama").value;
  var hp = document.getElementById("hp").value;
  var kondisi = document.getElementById("kondisi").value;
  var harga = document.getElementById("harga").value;
  var ket = document.getElementById("ket").value;

  var text = "Jual HP - " + nama + " | " + hp + " | " + kondisi + " | " + harga + " | " + ket;

  var link = "https://api.whatsapp.com/send?phone=6283805811175&text=" + encodeURIComponent(text);

  window.location.href = link;
}
</script>

</body>
</html>
